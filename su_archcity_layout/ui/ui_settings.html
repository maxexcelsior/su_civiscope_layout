<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: "Segoe UI", sans-serif; background-color: #fff; margin: 0; display: flex; height: 100vh;}
    .sidebar { width: 100px; background: #f5f5f5; border-right: 1px solid #ddd; }
    .nav-item { padding: 15px 10px; cursor: pointer; text-align: center; font-size: 13px; color: #555; }
    .nav-item.active { background: #fff; color: #0056b3; font-weight: bold; border-left: 3px solid #0056b3; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    h3 { margin-top: 0; font-size: 16px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .list-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 13px; }
    .list-item.default { color: #888; background: #fafafa; }
    .btn-del { color: red; cursor: pointer; border: none; background: none; }
    .add-box { margin-top: 15px; display: flex; }
    .add-box input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; }
    .add-box button { background: #0056b3; color: white; border: none; padding: 0 15px; cursor: pointer; border-radius: 0 4px 4px 0; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="nav-item active" onclick="switchTab('tab-building')">🏢 建筑</div>
    <div class="nav-item" onclick="switchTab('tab-site')">🗺️ 用地</div>
  </div>
  <div class="content">
    <div id="tab-building" class="tab-content active">
      <h3>建筑功能选项管理</h3>
      <div id="bldg-func-list"></div>
      <div class="add-box">
        <input type="text" id="new-bldg-func" placeholder="输入自定义功能...">
        <button onclick="addFunc('bldg')">添加</button>
      </div>
    </div>
    
    <div id="tab-site" class="tab-content">
      <h3 style="border-bottom-color: #28a745;">用地功能选项管理</h3>
      <div id="site-func-list"></div>
      <div class="add-box">
        <input type="text" id="new-site-func" placeholder="输入自定义用地..." style="border-color:#28a745;">
        <button onclick="addFunc('site')" style="background:#28a745;">添加</button>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }
    
    function renderLists(bDefs, bCust, sDefs, sCust) {
      let bHtml = '';
      bDefs.forEach(f => { bHtml += `<div class="list-item default"><span>${f}</span> <span>(默认)</span></div>`; });
      bCust.forEach(f => { bHtml += `<div class="list-item"><span>${f}</span> <button class="btn-del" onclick="delFunc('bldg', '${f}')">✕ 删除</button></div>`; });
      document.getElementById('bldg-func-list').innerHTML = bHtml;

      let sHtml = '';
      sDefs.forEach(f => { sHtml += `<div class="list-item default"><span>${f}</span> <span>(默认)</span></div>`; });
      sCust.forEach(f => { sHtml += `<div class="list-item"><span>${f}</span> <button class="btn-del" onclick="delFunc('site', '${f}')">✕ 删除</button></div>`; });
      document.getElementById('site-func-list').innerHTML = sHtml;
    }

    function addFunc(type) {
      let val = document.getElementById(`new-${type}-func`).value.trim();
      if(val) { 
        sketchup.add_custom_func(type, val); 
        document.getElementById(`new-${type}-func`).value = ''; 
      }
    }
    function delFunc(type, f) { sketchup.del_custom_func(type, f); }
    window.onload = function() { sketchup.ready(); };
  </script>
</body>
</html>
