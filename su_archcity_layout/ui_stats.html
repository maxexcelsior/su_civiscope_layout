<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: "Segoe UI", sans-serif; background-color: #f0f2f5; color: #1a1a1a; margin: 0; }
    
    /* 顶部标签页样式 */
    .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; padding: 0 10px; }
    .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; color: #666; font-size: 14px; transition: 0.2s; }
    .tab:hover { color: #0056b3; }
    .tab.active { font-weight: bold; color: #0056b3; border-bottom: 2px solid #0056b3; }
    .tab-content { display: none; padding: 12px; }
    .tab-content.active { display: block; }

    /* 原有卡片样式 */
    .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; }
    .title { font-size: 14px; font-weight: bold; color: #444; margin-bottom: 12px; border-left: 4px solid #0056b3; padding-left: 8px; display: flex; justify-content: space-between; align-items: center;}
    .id-badge { font-size: 12px; color: #fff; background-color: #0056b3; padding: 2px 8px; border-radius: 12px; font-weight: normal; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
    input[type="number"], input[type="text"], select { width: 100px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; box-sizing: border-box;}
    .data-label { color: #666; }
    .data-value { font-weight: 600; color: #000; }
    .highlight { color: #0056b3; font-size: 16px; font-weight: bold; }
    .btn { display: block; width: 100%; background: #0056b3; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    
    #view-bim, #view-normal, #view-multi { display: none; }
    #view-empty { text-align: center; color: #999; padding: 40px 0; font-style: italic; }
    .multi-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 10px; }
    .multi-table th { padding: 5px 0; border-bottom: 2px solid #ddd; color: #555; text-align: center; }
    .multi-table td { padding: 6px 0; border-bottom: 1px solid #eee; text-align: center; }
  </style>
</head>
<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tab-bldg', event)">🏢 建筑</div>
    <div class="tab" onclick="switchTab('tab-site', event)">🗺️ 用地</div>
  </div>

  <div id="tab-bldg" class="tab-content active">
    <div id="view-empty">👆 请选择场景中的群组/组件体块</div>

    <div id="view-normal" class="card">
      <p style="font-size:13px; text-align:center;">检测到普通模型，请先注入参数</p>
      <button class="btn" onclick="sketchup.convert()">✨ 转化为智能 BIM 体块</button>
    </div>

    <div id="view-bim">
      <div class="card">
        <div class="title">体块设置<span class="id-badge" id="val-id" title="系统底层ID">ID: --</span></div>
        <div class="row">
          <span class="data-label">🏷️ 建筑编号</span>
          <input type="text" id="inp-no" placeholder="如: T1" onchange="updateParams()">
        </div>
        <div class="row">
          <span class="data-label">📐 标准层高 (m)</span>
          <input type="number" id="inp-h" step="0.1" onchange="updateParams()">
        </div>
        <div class="row">
          <span class="data-label">📌 建筑功能</span>
          <select id="inp-f" onchange="updateParams()"></select>
        </div>
      </div>
      
      <div class="card">
        <div class="title">实时计算结果</div>
        <div class="row"><span class="data-label">📏 总体高度:</span> <span class="data-value" id="val-th">0</span> m</div>
        <div class="row"><span class="data-label">🔢 自动层数:</span> <span class="data-value" id="val-fc">0</span> 层</div>
        <div class="row"><span class="data-label">👣 基底面积:</span> <span class="data-value" id="val-ba">0</span> m²</div>
        <div class="row" style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
          <span style="font-weight:bold;">总建筑面积:</span><span class="highlight"><span id="val-area">0.00</span> m²</span>
        </div>
      </div>
    </div>

    <div id="view-multi" class="card">
      <div class="title" style="border-left-color: #28a745;">多体块汇总统计</div>
      <table class="multi-table">
        <thead><tr><th style="text-align:left;">编号</th><th>功能</th><th style="text-align:right;">面积(m²)</th></tr></thead>
        <tbody id="multi-list"></tbody>
      </table>
      <div class="row" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
        <span style="font-weight:bold; font-size:14px;">总计建筑面积:</span>
        <span class="highlight" style="color: #28a745;"><span id="val-total-area">0.00</span> m²</span>
      </div>
    </div>
  </div>

  <div id="tab-site" class="tab-content">
    <div class="card" style="text-align: center; color: #888; padding: 40px 0; font-style: italic;">
      🚀 用地统计功能开发中...
    </div>
  </div>

  <script>
    // 标签页切换逻辑
    function switchTab(tabId, event) {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }

    // 智能定位与初始化
    window.onload = function() {
      // 获取当前屏幕可用高度，减去面板预估高度 550，除以 2 得到完美的垂直居中 Top 坐标
      let topMargin = Math.max(0, (window.screen.availHeight - 550) / 2);
      // 将面板强行吸附在距离屏幕左侧 80px 的位置，并保持垂直居中
      window.moveTo(80, topMargin);
      
      // 通知 Ruby 后端 UI 已经准备完毕
      sketchup.ready(); 
    };

    function updateParams() { 
      sketchup.apply_params(
        document.getElementById('inp-h').value, 
        document.getElementById('inp-f').value,
        document.getElementById('inp-no').value
      ); 
    }
    
    function refreshUI(state, funcs, data) {
      document.getElementById('view-empty').style.display = 'none';
      document.getElementById('view-normal').style.display = 'none';
      document.getElementById('view-bim').style.display = 'none';
      document.getElementById('view-multi').style.display = 'none';
      
      if(state === 'empty') {
        document.getElementById('view-empty').style.display = 'block';
      }
      else if(state === 'normal') {
        document.getElementById('view-normal').style.display = 'block';
      }
      else if(state === 'bim') {
        document.getElementById('view-bim').style.display = 'block';
        document.getElementById('val-id').innerText = "ID: " + data.id;
        document.getElementById('inp-no').value = data.no;
        
        let selectStr = "";
        funcs.forEach(f => { selectStr += `<option value="${f}" ${(f === data.f) ? "selected" : ""}>${f}</option>`; });
        if(data.f && !funcs.includes(data.f)) selectStr += `<option value="${data.f}" selected>${data.f} (未知)</option>`;
        document.getElementById('inp-f').innerHTML = selectStr;
        
        document.getElementById('inp-h').value = data.h;
        document.getElementById('val-th').innerText = data.th;
        document.getElementById('val-fc').innerText = data.fc;
        document.getElementById('val-ba').innerText = data.ba;
        document.getElementById('val-area').innerText = data.area;
      }
      else if(state === 'multi') {
        document.getElementById('view-multi').style.display = 'block';
        let listHtml = "";
        data.list.forEach(item => {
          let displayNo = item.no ? item.no : "<span style='color:#aaa'>未编号</span>";
          listHtml += `<tr>
            <td style="text-align:left; color:#0056b3; font-weight:bold;">${displayNo}</td>
            <td>${item.f}</td>
            <td style="text-align:right; font-weight:bold;">${item.area}</td>
          </tr>`;
        });
        document.getElementById('multi-list').innerHTML = listHtml;
        document.getElementById('val-total-area').innerText = data.total;
      }
    }
  </script>
</body>
</html>
