<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: "Segoe UI", sans-serif; background-color: #f9f9f9; text-align: center; padding: 40px 20px; margin: 0; color: #333;}
    .logo { font-size: 48px; margin-bottom: 10px; }
    h2 { margin: 0 0 5px 0; color: #0056b3; }
    p { margin: 5px 0; font-size: 14px; color: #666; }
    .footer { margin-top: 30px; font-size: 12px; color: #aaa; border-top: 1px solid #ddd; padding-top: 15px;}
    .contact-btns { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
    .contact-btns button {
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .contact-btns button:hover { background: #f0f0f0; border-color: #bbb; }
  </style>
</head>
<body>
  <div class="logo">🏙️</div>
  <h2>Civiscope Layout</h2>
  <p>智能城市规划与建筑体块推敲系统</p><br>
  <p id="info-ver"><strong>版本:</strong> 加载中...</p>
  <p id="info-auth"><strong>作者:</strong> 加载中...</p>
  <div class="contact-btns">
    <button onclick="sketchup.contactAuthor()">📧 联系作者</button>
    <button onclick="sketchup.supportAuthor()">☕ 打赏作者</button>
  </div>
  <div class="footer">&copy; 2026 MaxExcelsior. All rights reserved.</div>

  <script>
    function setInfo(version, author) {
      document.getElementById('info-ver').innerHTML = "<strong>版本:</strong> " + version;
      document.getElementById('info-auth').innerHTML = "<strong>作者:</strong> " + author;
    }
    window.onload = function() { sketchup.ready(); };
  </script>
</body>
</html>
